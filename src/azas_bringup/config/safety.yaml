motion:
  max_velocity_scale: 0.1       # 초기 dry-run 안전 제한; 실제 운영 전 확인 필요
  max_acceleration_scale: 0.1   # 초기 dry-run 안전 제한; 실제 운영 전 확인 필요
  workspace_bounds_m: null      # 확인 필요
  min_z_m: null                 # 확인 필요: table/collision geometry 기반
gripper:
  default_width_m: null         # 확인 필요: RG2 단위/명령 범위
  default_force_n: null         # 확인 필요
  timeout_s: 5.0
failure_behavior:
  on_detection_failure: abort_without_motion
  on_tf_failure: abort_without_motion
  on_plan_failure: stop_before_execution
